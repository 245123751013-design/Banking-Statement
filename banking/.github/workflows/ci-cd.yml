name: Banking Statement CI/CD
on:
  push:
    branches: 
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/setup.python@v5
        with:
          python-version: '3.12'
      - name: Install BackendDependencies
      run:
        cd banking
        python manage.py check
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          Node-Version: '22'
      - name: Install Frontend Dependencies
        run:
          cd frontend
          npm install
      - name: Build React App
        run:
          cd frontend
          npm run build
